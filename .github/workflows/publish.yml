# Publish rqm-pennylane to PyPI whenever a GitHub Release is published.
#
# Authentication uses PyPI Trusted Publishing (OIDC) — no API tokens or
# passwords need to be stored as repository secrets.  Before this workflow
# can push packages you must configure a Trusted Publisher on PyPI:
#
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new "pending" publisher with:
#        PyPI project name : rqm-pennylane
#        Owner             : RQM-Technologies-dev
#        Repository name   : rqm-pennylane
#        Workflow filename  : publish.yml
#        Environment name  : pypi
#
# Once configured, publishing is fully automated: create a GitHub Release
# (from a tag, e.g. v0.2.0) and this workflow runs automatically.

name: Publish to PyPI

on:
  release:
    types: [published]

# Default to no permissions; each job grants only what it needs.
permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    permissions:
      contents: read  # to check out the repository

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/rqm-pennylane

    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
